services:
  mongodb:
    image: mongo:6.0
    container_name: kyrgyz-heritage-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: cultural-heritage
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./server
    container_name: kyrgyz-heritage-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cultural-heritage?authSource=admin
      - JWT_SECRET=kyrgyz-heritage-hackathon-secret
      - JWT_EXPIRE=30d
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb

  frontend:
    build: ./client
    container_name: kyrgyz-heritage-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:5000
    depends_on:
      - backend
